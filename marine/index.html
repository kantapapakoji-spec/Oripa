<!doctype html>
<html lang="ja">
<head>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>PIXEL SUMMER STORY</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#08051f;color:white;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif}
button{font-family:inherit;font-weight:1000;border:0;color:white;cursor:pointer;touch-action:manipulation;user-select:none;-webkit-user-select:none;position:relative;z-index:20}
.screen{position:fixed;inset:0;display:none;overflow:hidden}
.screen.active{display:block}
.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:saturate(1.12) contrast(1.06)}
.vignette{position:absolute;inset:0;background:radial-gradient(circle at 50% 34%,transparent 35%,rgba(5,4,25,.45) 74%,rgba(0,0,0,.75));pointer-events:none}
.logo{position:absolute;left:0;right:0;top:calc(env(safe-area-inset-top) + 24px);text-align:center;z-index:5;pointer-events:none}
.logoMain{font-size:clamp(42px,12vw,78px);font-weight:1000;line-height:.92;letter-spacing:1px;background:linear-gradient(#fff,#ffe8ff 25%,#ff73d9 60%,#fff2a0);-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-stroke:3px #641287;filter:drop-shadow(0 7px 0 #24104a) drop-shadow(0 0 12px #fff) drop-shadow(0 0 26px #ff8ed1);animation:pulse 1.1s infinite alternate}
.logoSub{font-size:clamp(18px,5.2vw,34px);font-weight:1000;color:#fff8c9;text-shadow:3px 3px 0 #25248a,0 0 12px #fff;letter-spacing:2px}
@keyframes pulse{to{transform:scale(1.04)}}
.btn{min-width:min(88vw,420px);padding:14px 18px;border-radius:18px;font-size:20px;box-shadow:0 6px 0 rgba(0,0,0,.35),inset 0 2px rgba(255,255,255,.7);text-shadow:2px 2px 0 rgba(0,0,0,.35)}
.pink{background:linear-gradient(#ffb3ef,#ff4db8)}
.blue{background:linear-gradient(#93efff,#2589ff)}
.gold{background:linear-gradient(#fff2a0,#f3a91d);color:#291500;text-shadow:1px 1px white}
.cyan{background:linear-gradient(#eaffff,#64e8ff);color:#123;text-shadow:1px 1px white}
.titleBtns{position:absolute;left:12px;right:12px;bottom:calc(env(safe-area-inset-bottom) + 24px);display:flex;flex-direction:column;gap:10px;align-items:center;z-index:30;pointer-events:auto}
.row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.row .btn{min-width:min(42vw,205px);font-size:16px;padding:12px}
#game{background:#071034}
.topbar{position:absolute;top:calc(env(safe-area-inset-top) + 10px);left:10px;right:10px;z-index:10;display:flex;justify-content:space-between;gap:8px}
.panel{background:rgba(12,17,62,.84);border:3px solid #ffe689;border-radius:14px;padding:8px 10px;font-weight:1000;text-shadow:2px 2px #000}
#msg{position:absolute;left:10px;right:10px;top:calc(env(safe-area-inset-top) + 62px);z-index:10;text-align:center;font-weight:1000;font-size:18px;text-shadow:2px 2px #000}
#board{position:absolute;left:50%;top:54%;transform:translate(-50%,-50%);display:grid;gap:3px;padding:8px;border-radius:20px;background:rgba(255,255,255,.1);box-shadow:0 0 0 4px #4ccfff,0 0 28px rgba(255,255,255,.45);touch-action:none}
.cell{width:34px;height:34px;border-radius:8px;background:linear-gradient(#8feaff,#2088e6);display:flex;align-items:center;justify-content:center;font-weight:1000;font-size:18px;box-shadow:inset 0 2px rgba(255,255,255,.6),0 3px 0 rgba(0,0,0,.32);user-select:none;touch-action:none}
.cell.open{background:linear-gradient(#fff8cf,#ffd36a);color:#103}
.cell.flag{background:linear-gradient(#ffb1e9,#f83a9a)}
.cell.bomb{background:linear-gradient(#2d1035,#ff3b3b)}
.gameBtns{position:absolute;left:8px;right:8px;bottom:calc(env(safe-area-inset-bottom) + 12px);z-index:12;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.gameBtns .btn{min-width:92px;font-size:14px;padding:10px}
.flagOn{filter:brightness(1.25);box-shadow:0 0 16px #ff8ed1,0 6px 0 rgba(0,0,0,.35),inset 0 2px rgba(255,255,255,.7)!important}
.overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(6,8,35,.92);z-index:1000;padding:16px;pointer-events:auto}
.overlay.active{display:flex}
.modal{width:min(94vw,540px);max-height:90vh;overflow:auto;border:5px solid #fff19a;border-radius:24px;background:linear-gradient(#26378d,#11163e);box-shadow:0 0 0 4px #ff8ed1,0 0 35px rgba(255,255,255,.45);padding:16px;color:white}
.modal h2{text-align:center;margin:4px 0 12px;font-size:30px;text-shadow:3px 3px #8d2a81,0 0 10px white}
.rule{background:rgba(255,255,255,.08);border:3px solid #8cf5ff;border-radius:16px;padding:10px;margin:10px 0;font-weight:900;line-height:1.55}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.card{border:3px solid #ffe689;border-radius:14px;overflow:hidden;background:#151943;box-shadow:0 0 16px rgba(255,255,255,.2);position:relative}
.card img,.lockedImg{width:100%;aspect-ratio:9/16;object-fit:cover;display:flex;align-items:center;justify-content:center;background:linear-gradient(#202557,#090b24);font-size:34px}
.card.locked{filter:grayscale(1) brightness(.55)}
.card.locked:after{content:"LOCK";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.34);font-size:22px;font-weight:1000;color:#fff19a;text-shadow:2px 2px #000,0 0 12px #fff}
.cardName{font-size:12px;font-weight:1000;padding:6px;text-align:center;line-height:1.25;color:#fff8c9;text-shadow:1px 1px #000}
.viewer{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:#02010c;z-index:1600;flex-direction:column}
.viewer.active{display:flex}
.viewer img{max-width:100vw;max-height:92vh;object-fit:contain}
.viewer div{position:absolute;bottom:calc(env(safe-area-inset-bottom) + 12px);left:10px;right:10px;text-align:center;font-weight:1000;text-shadow:2px 2px #000;background:rgba(0,0,0,.45);border-radius:12px;padding:8px}
#gachaOverlay{background:radial-gradient(circle at 50% 40%,rgba(255,255,255,.96),rgba(255,142,209,.68) 27%,rgba(8,8,45,.96) 74%);z-index:1500}
.gachaBox{width:min(92vw,480px);min-height:430px;display:flex;align-items:center;justify-content:center;flex-direction:column;border:5px solid #fff19a;border-radius:26px;background:linear-gradient(180deg,#271758,#101442);box-shadow:0 0 0 4px #ff8ed1,0 0 55px #fff;color:white;text-align:center;overflow:hidden;position:relative}
.orb{width:180px;height:180px;border-radius:50%;background:radial-gradient(circle at 35% 25%,#fff,#fff19a 18%,#ff8ed1 42%,#7f4dff 75%);box-shadow:0 0 30px #fff,0 0 60px #ff8ed1,0 0 100px #8cf5ff;animation:spin .8s infinite linear,pop .5s infinite alternate}
@keyframes spin{to{transform:rotate(360deg)}}@keyframes pop{to{filter:brightness(1.45);transform:scale(1.08)}}
.gachaText{font-size:30px;font-weight:1000;margin:20px 0;text-shadow:3px 3px #8d2a81,0 0 12px #fff}
.rewardCard{text-align:center}
.rewardCard img{width:min(84vw,360px);max-height:72vh;object-fit:contain;border-radius:18px;border:4px solid #fff19a;box-shadow:0 0 28px #fff}
.rewardName{font-size:24px;font-weight:1000;margin:10px 0;text-shadow:3px 3px #000,0 0 16px #ff8ed1}
</style>
</head>
<body>
<section id="title" class="screen active">
  <img class="bg" src="assets/images/title_bg.jpg">
  <div class="vignette"></div>
  <div class="logo"><div class="logoMain">PIXEL<br>SUMMER</div><div class="logoSub">STORY</div></div>
  <div class="titleBtns">
    <button class="btn pink" data-action="start">START</button>
    <div class="row">
      <button class="btn blue" data-action="collection">COLLECTION</button>
      <button class="btn cyan" data-action="how">HOW TO PLAY</button>
    </div>
  </div>
</section>

<section id="game" class="screen">
  <div class="topbar"><div class="panel">STAGE <span id="stageEl">1</span>/19</div><div class="panel">TIME <span id="timeEl">--</span></div><div class="panel">🎁 <span id="ownedEl">0</span></div></div>
  <div id="msg">安全なマスを開こう！</div>
  <div id="board"></div>
  <div class="gameBtns">
    <button class="btn blue" data-action="title">TITLE</button>
    <button class="btn gold" id="flagBtn" data-action="flag">FLAG OFF</button>
    <button class="btn gold" data-action="bgm">BGM</button>
    <button class="btn pink" data-action="retry">RETRY</button>
  </div>
</section>

<div id="howOverlay" class="overlay">
 <div class="modal">
  <h2>HOW TO PLAY</h2>
  <div class="rule">🎮 <b>ゲーム内容</b><br>機雷を避けて安全なマスをすべて開くゲームです。</div>
  <div class="rule">🚩 <b>操作</b><br>通常：タップで開く<br>FLAG MODE：タップで旗<br>長押し：旗の付け外し</div>
  <div class="rule">🎰 <b>ご褒美ガチャ</b><br>ステージクリア後にガチャボタンを押すとランダムで画像GET。後半ほど高レアが出やすくなります。</div>
  <div class="rule">🎁 <b>コレクション</b><br>ガチャで出た画像だけ解放。ステージ19クリア後は全解放です。</div>
  <button class="btn pink" data-action="closeHow">閉じる</button>
 </div>
</div>

<div id="collectionOverlay" class="overlay">
 <div class="modal">
  <h2>COLLECTION <span id="collectionCount">0/19</span></h2>
  <div id="collectionGrid" class="grid"></div>
  <div class="row"><button class="btn gold" data-action="reset">RESET</button><button class="btn pink" data-action="closeCollection">閉じる</button></div>
 </div>
</div>

<div id="viewer" class="viewer"><img id="viewerImg"><div id="viewerText"></div></div>

<div id="gachaOverlay" class="overlay">
 <div class="gachaBox">
  <div class="orb"></div>
  <div id="gachaText" class="gachaText">ご褒美ガチャ！</div>
  <button class="btn pink" data-action="draw">ガチャを引く</button>
 </div>
</div>

<div id="rewardOverlay" class="overlay">
 <div class="modal rewardCard">
  <h2>REWARD GET!</h2>
  <img id="rewardImg">
  <div id="rewardName" class="rewardName"></div>
  <button class="btn pink" data-action="next">NEXT</button>
 </div>
</div>

<script>
const rewards=[{"id": 1, "name": "サバンナスマイル", "file": "assets/images/rewards/collection_slot_01_v4.jpg", "thumb": "assets/images/rewards/collection_slot_01_v4.jpg", "rare": "R", "owned": false}, {"id": 2, "name": "制服ヒロイン・春の出会い", "file": "assets/images/rewards/collection_slot_02_v4.jpg", "thumb": "assets/images/rewards/collection_slot_02_v4.jpg", "rare": "R", "owned": false}, {"id": 3, "name": "海辺のスーツヒロイン", "file": "assets/images/rewards/collection_slot_03_v4.jpg", "thumb": "assets/images/rewards/collection_slot_03_v4.jpg", "rare": "R", "owned": false}, {"id": 4, "name": "弓道ヒロイン", "file": "assets/images/rewards/collection_slot_04_v4.jpg", "thumb": "assets/images/rewards/collection_slot_04_v4.jpg", "rare": "R", "owned": false}, {"id": 5, "name": "ナースお姉さん", "file": "assets/images/rewards/collection_slot_05_v4.jpg", "thumb": "assets/images/rewards/collection_slot_05_v4.jpg", "rare": "SR", "owned": false}, {"id": 6, "name": "海辺の振り向き", "file": "assets/images/rewards/collection_slot_06_v4.jpg", "thumb": "assets/images/rewards/collection_slot_06_v4.jpg", "rare": "SR", "owned": false}, {"id": 7, "name": "夜景の女社長", "file": "assets/images/rewards/collection_slot_07_v4.jpg", "thumb": "assets/images/rewards/collection_slot_07_v4.jpg", "rare": "SR", "owned": false}, {"id": 8, "name": "雨の日の照れ笑顔", "file": "assets/images/rewards/collection_slot_08_v4.jpg", "thumb": "assets/images/rewards/collection_slot_08_v4.jpg", "rare": "SR", "owned": false}, {"id": 9, "name": "陸上ランナー", "file": "assets/images/rewards/collection_slot_09_v4.jpg", "thumb": "assets/images/rewards/collection_slot_09_v4.jpg", "rare": "SSR", "owned": false}, {"id": 10, "name": "プールサイドスイマー", "file": "assets/images/rewards/collection_slot_10_v4.jpg", "thumb": "assets/images/rewards/collection_slot_10_v4.jpg", "rare": "SSR", "owned": false}, {"id": 11, "name": "現場ガッテン作業員", "file": "assets/images/rewards/collection_slot_11_v4.jpg", "thumb": "assets/images/rewards/collection_slot_11_v4.jpg", "rare": "SSR", "owned": false}, {"id": 12, "name": "サーファーガール", "file": "assets/images/rewards/collection_slot_12_v4.jpg", "thumb": "assets/images/rewards/collection_slot_12_v4.jpg", "rare": "SSR", "owned": false}, {"id": 13, "name": "サンバカーニバル", "file": "assets/images/rewards/collection_slot_13_v4.jpg", "thumb": "assets/images/rewards/collection_slot_13_v4.jpg", "rare": "UR", "owned": false}, {"id": 14, "name": "特別イベントヒロイン", "file": "assets/images/rewards/collection_slot_14_special_heroine_final.jpg", "thumb": "assets/images/rewards/collection_slot_14_special_heroine_final.jpg", "rare": "UR", "owned": false}, {"id": 15, "name": "メガネメイド", "file": "assets/images/rewards/collection_slot_15_v4.jpg", "thumb": "assets/images/rewards/collection_slot_15_v4.jpg", "rare": "UR", "owned": false}, {"id": 16, "name": "アメリカンガール", "file": "assets/images/rewards/collection_slot_16_v4.jpg", "thumb": "assets/images/rewards/collection_slot_16_v4.jpg", "rare": "UR", "owned": false}, {"id": 17, "name": "クール婦警", "file": "assets/images/rewards/collection_slot_17_v4.jpg", "thumb": "assets/images/rewards/collection_slot_17_v4.jpg", "rare": "LEGEND", "owned": false}, {"id": 18, "name": "読者モデル", "file": "assets/images/rewards/collection_slot_18_v4.jpg", "thumb": "assets/images/rewards/collection_slot_18_v4.jpg", "rare": "LEGEND", "owned": false}, {"id": 19, "name": "全員集合", "file": "assets/images/rewards/collection_slot_19_v4.jpg", "thumb": "assets/images/rewards/collection_slot_19_v4.jpg", "rare": "LEGEND", "owned": false}];
const totalStages=19;
const unlockKey="pixelSummerUnlocked_v2";
let stage=1, rows=6, cols=5, mines=5, board=[], opened=0, gameActive=false, flagMode=false, timeLeft=0, timer=null, pending=false, pendingReward=null;
let audioCtx=null,bgmOn=true,bgmTimer=null,bgmSpeed=360;
const $=id=>document.getElementById(id);

function unlocked(){try{return JSON.parse(localStorage.getItem(unlockKey)||"[]").map(Number)}catch(e){return[]}}
function saveUnlocked(a){localStorage.setItem(unlockKey,JSON.stringify([...new Set(a.map(Number))].sort((x,y)=>x-y)))}
function isUnlocked(id){return unlocked().includes(Number(id))}
function unlock(id){const u=unlocked();u.push(Number(id));saveUnlocked(u);updateOwned()}
function unlockAll(){saveUnlocked(rewards.map(r=>Number(r.id)));updateOwned()}
function resetUnlock(){localStorage.removeItem(unlockKey);updateOwned()}
function updateOwned(){$("ownedEl").textContent=unlocked().length;$("collectionCount").textContent=unlocked().length+" / "+rewards.length}

function showScreen(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));$(id).classList.add("active")}
function openOv(id){$((id)).classList.add("active")}
function closeOv(id){$((id)).classList.remove("active")}

function initAudio(){if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==="suspended")audioCtx.resume()}
function beep(f=440,d=.06,t="square",v=.035){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(audioCtx.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+d);o.stop(audioCtx.currentTime+d)}
function seButton(){beep(560,.05);setTimeout(()=>beep(840,.05),45)}
function seOpen(){beep(720,.045,"triangle")}
function seFlag(){beep(360,.05);setTimeout(()=>beep(520,.05),40)}
function seBad(){beep(120,.18,"sawtooth",.04)}
function seGacha(){[360,520,720,960,1280].forEach((f,i)=>setTimeout(()=>beep(f,.08,"triangle",.045),i*120))}
function seSSR(){[520,720,1040,1320,1560].forEach((f,i)=>setTimeout(()=>beep(f,.12,"triangle",.055),i*90))}
function startBgm(){if(bgmTimer)clearInterval(bgmTimer);bgmTimer=setInterval(()=>{if(bgmOn&&$("game").classList.contains("active"))beep([262,330,392,523][Math.floor(Math.random()*4)],.045,"triangle",.016)},bgmSpeed)}
function setBgmSpeed(v){bgmSpeed=v;startBgm()}

function setupStage(s){stage=s;flagMode=false;updateFlag();$("stageEl").textContent=stage;rows=Math.min(9,5+Math.floor((stage-1)/4));cols=Math.min(7,5+Math.floor((stage-1)/5));mines=Math.min(rows*cols-5,4+Math.floor(stage*1.25));timeLeft=stage<5?0:Math.max(35,95-stage*3);$("timeEl").textContent=timeLeft?timeLeft:"--";opened=0;gameActive=true;pending=false;pendingReward=null;$("msg").textContent="安全なマスを開こう！";buildBoard();renderBoard();startTimer();setBgmSpeed(360);updateOwned()}
function buildBoard(){board=Array.from({length:rows*cols},(_,i)=>({i,bomb:false,open:false,flag:false,n:0}));let p=0;while(p<mines){const c=board[Math.floor(Math.random()*board.length)];if(!c.bomb){c.bomb=true;p++}}board.forEach(c=>c.n=neighbors(c.i).filter(j=>board[j].bomb).length)}
function neighbors(i){const r=Math.floor(i/cols),c=i%cols,a=[];for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){if(!dr&&!dc)continue;let rr=r+dr,cc=c+dc;if(rr>=0&&cc>=0&&rr<rows&&cc<cols)a.push(rr*cols+cc)}return a}
function renderBoard(){const b=$("board");b.style.gridTemplateColumns=`repeat(${cols},34px)`;b.innerHTML="";board.forEach(c=>{const d=document.createElement("div");d.className="cell"+(c.open?" open":"")+(c.flag?" flag":"")+(c.open&&c.bomb?" bomb":"");d.dataset.i=c.i;d.textContent=c.open?(c.bomb?"💣":(c.n||"")):(c.flag?"🚩":"");b.appendChild(d)})}
function toggleFlag(i){const c=board[i];if(!c||c.open)return;c.flag=!c.flag;seFlag();renderBoard()}
function openCell(i,silent=false){const c=board[i];if(!c||c.flag||c.open)return;c.open=true;if(!silent)seOpen();if(c.bomb){gameOver();return}opened++;if(c.n===0)neighbors(i).forEach(j=>{if(!board[j].open&&!board[j].flag)openCell(j,true)});renderBoard();if(opened>=rows*cols-mines)clearGame()}
function gameOver(){gameActive=false;clearInterval(timer);board.forEach(c=>{if(c.bomb)c.open=true});renderBoard();seBad();$("msg").textContent="MISS! RETRYしてね"}
function clearGame(){gameActive=false;clearInterval(timer);pending=true;$("msg").textContent=`STAGE ${stage} CLEAR!! ご褒美ガチャを引こう！`;$("gachaText").textContent=stage>=17?"LEGEND CHANCE!!":stage>=13?"UR CHANCE!!":stage>=9?"SSR CHANCE!!":"ご褒美ガチャ！";openOv("gachaOverlay");seGacha()}
function startTimer(){clearInterval(timer);if(!timeLeft)return;timer=setInterval(()=>{if(!gameActive)return;timeLeft--;$("timeEl").textContent=timeLeft;if(timeLeft===10)setBgmSpeed(170);if(timeLeft<=0)gameOver()},1000)}
function allowed(s){if(s<=4)return["R"];if(s<=8)return["R","SR"];if(s<=12)return["SR","SSR"];if(s<=16)return["SSR","UR"];return["UR","LEGEND"]}
function pickReward(){let pool=rewards.filter(r=>allowed(stage).includes(r.rare));if(!pool.length)pool=rewards;const rank={R:1,SR:2,SSR:3,UR:4,LEGEND:5},w=[];pool.forEach(r=>{let n=Math.max(1,Math.floor(rank[r.rare]*(stage/5+1)));for(let i=0;i<n;i++)w.push(r)});return w[Math.floor(Math.random()*w.length)]}
function drawGacha(){if(!pending)return;pending=false;pendingReward=pickReward();$("gachaText").textContent=pendingReward.rare+" GET!!";seGacha();if(["UR","LEGEND"].includes(pendingReward.rare))setTimeout(seSSR,500);setTimeout(()=>{closeOv("gachaOverlay");showReward(pendingReward)},850)}
function showReward(r){unlock(r.id);$("rewardImg").src=r.file+"?v=btnfix";$("rewardName").textContent=`${r.name} [${r.rare}]`;openOv("rewardOverlay")}
function renderCollection(){const u=unlocked();$("collectionCount").textContent=u.length+" / "+rewards.length;$("collectionGrid").innerHTML=rewards.map(r=>{const open=u.includes(Number(r.id));return `<div class="card ${open?"":"locked"}" data-id="${r.id}">${open?`<img src="${r.thumb||r.file}?v=btnfix">`:`<div class="lockedImg">?</div>`}<div class="cardName">${String(r.id).padStart(2,"0")} ${open?r.name:"未解放"} [${open?r.rare:"?"}]</div></div>`}).join("");document.querySelectorAll(".card").forEach(c=>c.onclick=()=>{const id=Number(c.dataset.id);if(!isUnlocked(id)){seBad();return}const r=rewards.find(x=>Number(x.id)===id);$("viewerImg").src=r.file+"?v=btnfix";$("viewerText").textContent=`${String(r.id).padStart(2,"0")} ${r.name} [${r.rare}] / タップで戻る`;$("viewer").classList.add("active")})}
function updateFlag(){const b=$("flagBtn");if(!b)return;b.textContent=flagMode?"FLAG ON":"FLAG OFF";b.classList.toggle("flagOn",flagMode)}

let pressTimer=null,longPress=false,pressIndex=null;
$("board").addEventListener("pointerdown",e=>{const c=e.target.closest(".cell");if(!c||!gameActive)return;e.preventDefault();longPress=false;pressIndex=Number(c.dataset.i);pressTimer=setTimeout(()=>{longPress=true;toggleFlag(pressIndex);if(navigator.vibrate)navigator.vibrate(18)},420)},{passive:false});
$("board").addEventListener("pointerup",e=>{const c=e.target.closest(".cell");if(!c||!gameActive)return;e.preventDefault();if(pressTimer)clearTimeout(pressTimer);const i=Number(c.dataset.i);if(!longPress){flagMode?toggleFlag(i):openCell(i)}longPress=false;pressIndex=null},{passive:false});
$("board").addEventListener("pointercancel",()=>{if(pressTimer)clearTimeout(pressTimer);longPress=false;pressIndex=null},{passive:true});
$("board").addEventListener("contextmenu",e=>e.preventDefault());

document.addEventListener("click",e=>{
// reward overlay tap anywhere
if(document.getElementById("rewardOverlay").classList.contains("active") && !e.target.closest("button")){
    const nextBtn = document.querySelector('[data-action="next"]');
    if(nextBtn){ nextBtn.click(); return; }
}const btn=e.target.closest("button[data-action]");if(!btn)return;e.preventDefault();e.stopPropagation();initAudio();const a=btn.dataset.action;seButton();
 if(a==="start"){showScreen("game");setupStage(1);startBgm()}
 if(a==="collection"){renderCollection();openOv("collectionOverlay")}
 if(a==="how")openOv("howOverlay")
 if(a==="closeHow")closeOv("howOverlay")
 if(a==="closeCollection")closeOv("collectionOverlay")
 if(a==="reset"){if(confirm("コレクションをリセットしますか？")){resetUnlock();renderCollection()}}
 if(a==="title"){gameActive=false;clearInterval(timer);showScreen("title")}
 if(a==="retry")setupStage(stage)
 if(a==="flag"){flagMode=!flagMode;updateFlag()}
 if(a==="bgm")bgmOn=!bgmOn
 if(a==="draw")drawGacha()
 if(a==="next"){closeOv("rewardOverlay");if(stage>=totalStages){unlockAll();showScreen("title");alert("ALL CLEAR! コレクション全解放！")}else setupStage(stage+1)}
},true);
$("viewer").onclick=()=>$("viewer").classList.remove("active");
updateOwned();
</script>
</body>
</html>
